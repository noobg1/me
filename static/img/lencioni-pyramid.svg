<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" font-family="system-ui, -apple-system, sans-serif">
  <rect width="500" height="320" fill="#1a1a1a"/>

  <!-- Pyramid layers (bottom to top) -->
  <!-- Layer 1: Trust (base) -->
  <polygon points="50,270 450,270 380,220 120,220" fill="#28a745" opacity="0.85"/>
  <text x="250" y="252" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">🔒 Trust</text>

  <!-- Layer 2: Healthy Conflict -->
  <polygon points="120,220 380,220 330,170 170,170" fill="#f0a500" opacity="0.75"/>
  <text x="250" y="202" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">⚡ Healthy Conflict</text>

  <!-- Layer 3: Commitment -->
  <polygon points="170,170 330,170 290,120 210,120" fill="#f0a500" opacity="0.65"/>
  <text x="250" y="152" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">🤝 Commitment</text>

  <!-- Layer 4: Accountability -->
  <polygon points="210,120 290,120 270,75 230,75" fill="#f0a500" opacity="0.55"/>
  <text x="250" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">📋 Accountability</text>

  <!-- Layer 5: Results (top) -->
  <polygon points="230,75 270,75 250,40" fill="#28a745" opacity="0.85"/>
  <text x="250" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">🏆</text>

  <!-- Label -->
  <text x="250" y="305" text-anchor="middle" font-size="12" fill="#888" font-style="italic">Lencioni's Five Dysfunctions — inverted, it all starts with trust</text>
</svg>
