<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a1a"/>
  <defs>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="50%" stop-color="#28a745"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
  </defs>
  <!-- Trophy icon left -->
  <g transform="translate(100, 18)">
    <path d="M18,10 L18,0 L32,0 L32,10" stroke="#f0a500" stroke-width="2" fill="none"/>
    <path d="M12,10 L38,10 L36,38 Q25,46 14,38 Z" fill="#f0a500" opacity="0.85"/>
    <rect x="21" y="46" width="8" height="8" fill="#f0a500" opacity="0.7"/>
    <rect x="16" y="54" width="18" height="4" rx="2" fill="#f0a500" opacity="0.6"/>
  </g>
  <!-- Spectrum bar -->
  <rect x="170" y="35" width="460" height="14" rx="7" fill="url(#spectrum)" opacity="0.85"/>
  <!-- Center marker -->
  <circle cx="400" cy="42" r="10" fill="#1a1a1a" stroke="#28a745" stroke-width="2.5"/>
  <circle cx="400" cy="42" r="3" fill="#28a745"/>
  <!-- People icon right -->
  <g transform="translate(650, 15)">
    <circle cx="18" cy="14" r="11" fill="#4a9eff" opacity="0.8"/>
    <circle cx="42" cy="10" r="11" fill="#4a9eff" opacity="0.7"/>
    <circle cx="66" cy="14" r="11" fill="#4a9eff" opacity="0.8"/>
    <path d="M4,38 Q18,28 32,38 Q42,28 54,38 Q66,28 80,38 L80,58 L4,58 Z" fill="#4a9eff" opacity="0.4"/>
  </g>
  <!-- Labels -->
  <text x="170" y="75" font-family="system-ui,sans-serif" font-size="14" fill="#f0a500">Individual</text>
  <text x="630" y="75" text-anchor="end" font-family="system-ui,sans-serif" font-size="14" fill="#4a9eff">Team</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#28a745">depends on the work</text>
  <!-- Subtitle -->
  <text x="400" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#888">match the reward to the work</text>
  <!-- Title -->
  <text x="400" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="600" fill="#e0e0e0">The Reward Paradox</text>
  <!-- Accent line -->
  <rect x="330" y="205" width="140" height="2.5" rx="1" fill="#f0a500" opacity="0.5"/>
</svg>
