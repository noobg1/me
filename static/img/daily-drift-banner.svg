<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a1a"/>
  <!-- Iceberg shape -->
  <g transform="translate(330, 10)">
    <!-- Above water (visible - small) -->
    <polygon points="70,60 60,80 80,80" fill="#4a9eff" opacity="0.9"/>
    <!-- Waterline -->
    <line x1="30" y1="80" x2="110" y2="80" stroke="#4a9eff" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
    <!-- Below water (hidden - large) -->
    <polygon points="70,80 25,140 115,140" fill="#4a9eff" opacity="0.3"/>
    <polygon points="70,80 35,130 105,130" fill="#4a9eff" opacity="0.4"/>
  </g>
  <!-- Labels -->
  <text x="480" y="55" font-family="system-ui,sans-serif" font-size="11" fill="#4a9eff" opacity="0.9">💬 What we say</text>
  <text x="480" y="100" font-family="system-ui,sans-serif" font-size="11" fill="#4a9eff" opacity="0.6">🔒 What we mean</text>
  <text x="480" y="125" font-family="system-ui,sans-serif" font-size="11" fill="#4a9eff" opacity="0.4">❤️‍🩹 What we need</text>
  <!-- Subtitle -->
  <text x="400" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#888">between what is said and what is meant</text>
  <!-- Title -->
  <text x="400" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="600" fill="#e0e0e0">The Daily Drift</text>
  <rect x="340" y="222" width="120" height="2" rx="1" fill="#4a9eff" opacity="0.5"/>
</svg>
