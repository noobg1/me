<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a1a"/>

  <!-- Move 1: Make Reputation Travel -->
  <g transform="translate(115, 30)">
    <!-- Signal/broadcast icon -->
    <circle cx="25" cy="30" r="6" fill="#4a9eff"/>
    <path d="M38,18 A18,18 0 0,1 38,42" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.7"/>
    <path d="M44,12 A25,25 0 0,1 44,48" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
    <path d="M50,6 A32,32 0 0,1 50,54" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.2"/>
    <text x="25" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4a9eff">Reputation</text>
    <text x="25" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">make helping visible</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="55" x2="290" y2="55" stroke="#444" stroke-width="1.5"/>
  <polygon points="290,51 300,55 290,59" fill="#444"/>

  <!-- Move 2: Shared OKRs -->
  <g transform="translate(355, 30)">
    <!-- Two overlapping circles (shared goals) -->
    <circle cx="12" cy="28" r="18" fill="none" stroke="#28a745" stroke-width="1.5" opacity="0.6"/>
    <circle cx="36" cy="28" r="18" fill="none" stroke="#f0a500" stroke-width="1.5" opacity="0.6"/>
    <!-- Overlap highlight -->
    <text x="24" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e0e0e0">∩</text>
    <text x="24" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#28a745">Shared OKRs</text>
    <text x="24" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">tie outcomes together</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="480" y1="55" x2="530" y2="55" stroke="#444" stroke-width="1.5"/>
  <polygon points="530,51 540,55 530,59" fill="#444"/>

  <!-- Move 3: Cheap Cooperation -->
  <g transform="translate(600, 30)">
    <!-- Low barrier / open door icon -->
    <rect x="5" y="10" width="38" height="44" rx="3" fill="none" stroke="#dc3545" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,3"/>
    <line x1="5" y1="32" x2="43" y2="32" stroke="#dc3545" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,3"/>
    <polygon points="24,42 18,32 30,32" fill="#dc3545" opacity="0.6"/>
    <text x="24" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#dc3545">Low Cost</text>
    <text x="24" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">make cooperation cheap</text>
  </g>

  <!-- Bottom divider and summary -->
  <line x1="80" y1="160" x2="720" y2="160" stroke="#333" stroke-width="1"/>
  <text x="400" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#e0e0e0">Three Moves That Flip the Matrix</text>
  <text x="400" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#888">change the payoffs, and cooperation becomes the dominant strategy</text>
</svg>
