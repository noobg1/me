<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1a1a1a"/>
  <!-- Large inversion arrows — the hero element -->
  <g transform="translate(310, 15)">
    <!-- Down arrow (failure) -->
    <rect x="0" y="8" width="50" height="70" rx="8" fill="#dc3545" opacity="0.9"/>
    <polygon points="25,85 2,58 48,58" fill="#dc3545" opacity="0.9"/>
    <text x="25" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" fill="#1a1a1a" font-weight="700">✕</text>
    <!-- Up arrow (inversion) -->
    <rect x="70" y="18" width="50" height="70" rx="8" fill="#28a745" opacity="0.9"/>
    <polygon points="95,10 72,37 118,37" fill="#28a745" opacity="0.9"/>
    <text x="95" y="65" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" fill="#1a1a1a" font-weight="700">✓</text>
    <!-- Curved arrow between them -->
    <path d="M52,40 Q60,20 68,40" stroke="#e2b714" stroke-width="2.5" fill="none"/>
    <polygon points="68,36 74,42 66,44" fill="#e2b714"/>
  </g>
  <!-- Title -->
  <text x="400" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#e0e0e0">The Inversion Playbook</text>
  <!-- Three lens labels -->
  <g transform="translate(0, 195)">
    <text x="225" y="0" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#4a9eff" font-weight="600">Ownership</text>
    <text x="400" y="0" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#f0a500" font-weight="600">Trust</text>
    <text x="575" y="0" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#28a745" font-weight="600">Clarity</text>
    <!-- Dots between -->
    <circle cx="310" cy="-4" r="2.5" fill="#555"/>
    <circle cx="325" cy="-4" r="2.5" fill="#555"/>
    <circle cx="475" cy="-4" r="2.5" fill="#555"/>
    <circle cx="490" cy="-4" r="2.5" fill="#555"/>
  </g>
  <!-- Subtitle -->
  <text x="400" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#888">how to guarantee your team fails — and the inversions</text>
  <!-- Accent line -->
  <rect x="280" y="255" width="240" height="2.5" rx="1" fill="#e2b714" opacity="0.5"/>
</svg>
